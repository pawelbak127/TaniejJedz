services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    env_file: .env.dev
    volumes:
      - .:/opt/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --loop uvloop
      --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      target: runtime
    env_file: .env.dev
    volumes:
      - .:/opt/app
    command: >
      dramatiq app.jobs.compare_worker app.jobs.flush_analytics
      --processes 1
      --threads 2
      --verbose
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: taniejjedz
      POSTGRES_USER: taniejjedz
      POSTGRES_PASSWORD: localdevpassword
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./pg-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taniejjedz"]
      interval: 5s
      timeout: 3s
      retries: 5
    shm_size: 128m

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass localdevpassword
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "localdevpassword", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: localdevmasterkey
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data

  nominatim:
    image: mediagis/nominatim:4.3
    profiles: ["full"]
    ports:
      - "8080:8080"
    environment:
      PBF_URL: https://download.geofabrik.de/europe/poland-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/europe/poland-updates/
    volumes:
      - nominatim_data:/nominatim/data
    mem_limit: 2g

volumes:
  pg_data:
  redis_data:
  meili_data:
  nominatim_data:
